{% extends "base.html" %}
{% block title %}Edit Product — RetailOS{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block head %}
<style>
  /* ── Edit product page ── */
  .edit-product-wrap { max-width: 680px; }

  /* ── Card header with SKU subtitle ── */
  .edit-card-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
  }
  .edit-sku-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Changed-field highlight on focus ── */
  input:focus, select:focus, textarea:focus {
    background: var(--surface);
  }

  /* ── Form actions row ── */
  .edit-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    padding-top: 4px;
  }
</style>
{% endblock %}

{% block content %}
<div style="max-width:680px">
  <div class="flex justify-between items-center mb-6">
    <a href="{{ url_for('inventory_list') }}" class="btn btn-outline btn-sm">
      <i class="fa fa-arrow-left"></i> Back
    </a>
  </div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Edit — {{ product.name }}</span>
      <span class="mono text-muted">{{ product.sku }}</span>
    </div>
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Product Name *</label>
          <input name="name" required value="{{ product.name }}" />
        </div>
        <div class="form-group">
          <label>SKU *</label>
          <input name="sku" required value="{{ product.sku }}" />
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            {% for cat in ['Electronics','Accessories','Furniture','Audio','Other'] %}
            <option {% if product.category==cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Supplier</label>
          <input name="supplier" value="{{ product.supplier or '' }}" />
        </div>
        <div class="form-group">
          <label>Quantity *</label>
          <input name="quantity" type="number" min="0" required value="{{ product.quantity }}" />
        </div>
        <div class="form-group">
          <label>Unit Price (₹) *</label>
          <input name="unit_price" type="number" step="0.01" required value="{{ product.unit_price }}" />
        </div>
        <div class="form-group">
          <label>Reorder Level</label>
          <input name="reorder_level" type="number" min="0" value="{{ product.reorder_level }}" />
        </div>
      </div>
      <hr class="separator" />
      <div class="flex gap-2">
        <button type="submit" class="btn btn-accent"><i class="fa fa-save"></i> Save Changes</button>
        <a href="{{ url_for('inventory_list') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
