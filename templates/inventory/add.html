{% extends "base.html" %}
{% block title %}Add Product — RetailOS{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block head %}
<style>
  /* ── Add product page ── */
  .add-product-wrap { max-width: 680px; }

  /* ── Required field asterisk ── */
  .field-required::after {
    content: ' *';
    color: var(--accent);
    font-size: 11px;
  }

  /* ── Hint text below inputs ── */
  .field-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Category select placeholder style ── */
  select option[value=""] { color: var(--muted); }

  /* ── Form submit area ── */
  .form-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 4px;
  }
</style>
{% endblock %}

{% block content %}
<div style="max-width:680px">
  <div class="flex justify-between items-center mb-6">
    <a href="{{ url_for('inventory_list') }}" class="btn btn-outline btn-sm">
      <i class="fa fa-arrow-left"></i> Back
    </a>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">New Product</span></div>
    <form method="POST">
      <div class="form-grid">
        <div class="form-group">
          <label>Product Name *</label>
          <input name="name" required placeholder="e.g. Wireless Mouse Pro" />
        </div>
        <div class="form-group">
          <label>SKU *</label>
          <input name="sku" required placeholder="e.g. WM-101" />
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="">Select category</option>
            <option>Electronics</option>
            <option>Accessories</option>
            <option>Furniture</option>
            <option>Audio</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Supplier</label>
          <input name="supplier" placeholder="Supplier name" />
        </div>
        <div class="form-group">
          <label>Quantity *</label>
          <input name="quantity" type="number" min="0" required placeholder="0" />
        </div>
        <div class="form-group">
          <label>Unit Price (₹) *</label>
          <input name="unit_price" type="number" step="0.01" min="0" required placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Reorder Level</label>
          <input name="reorder_level" type="number" min="0" value="10" />
        </div>
      </div>
      <hr class="separator" />
      <div class="flex gap-2">
        <button type="submit" class="btn btn-accent"><i class="fa fa-save"></i> Add Product</button>
        <a href="{{ url_for('inventory_list') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
